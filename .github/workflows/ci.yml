name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run physics unit tests
        run: pytest tests/ -v --tb=short

      - name: Check app syntax
        run: python -c "import ast; ast.parse(open('app.py').read()); print('app.py syntax OK')"

      - name: Check src imports
        run: python -c "from src.physics import derivedParams; from src.html_template import build_html; from src.css import APP_CSS; print('All imports OK')"
